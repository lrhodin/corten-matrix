# ============================================================================
# Rustpush-Matrix — Docker compose example.
#
# Edit the two values below for your host:
#   - The bind mount (volumes)  — pick your appdata path
#   - BEEPER                    — "true" for Beeper, "false" for self-hosted
#
# The host data directory MUST be owned by the UID:GID the container
# runs as. By default that's 1000:1000 (the typical first Linux user).
# If your bind-mount sources are owned by a different UID, update the
# user: directive below to match. imessage start automatically checks and
# corrects permissions, so there's nothing to do manually.
#
# Everything else (CardDAV, FaceTime toggle, StatusKit, HEIC, video
# transcoding, preferred handle, …) is configured through the
# interactive `imessage setup` wizard and persisted in config.yaml on
# the bind mount. Compose stays minimal on purpose.
# ============================================================================

services:
  Rustpush-Matrix:
    image: ghcr.io/lrhodin/imessage:latest
    container_name: Rustpush-Matrix
    restart: unless-stopped
    stdin_open: true
    tty: true

    volumes:
      # Bridge state (config.yaml, mautrix-imessage.db, session.json,
      # trustedpeers.plist, ...). HOST path is your choice; the
      # container only cares about /data internally. Examples:
      #   Standard Linux desktop:  ~/.local/share/mautrix-imessage
      #   UNRAID:                  /mnt/user/appdata/Rustpush-Matrix
      #   Synology:                /volume1/docker/Rustpush-Matrix
      #   TrueNAS Scale:           a dataset of your choice
      - ~/.local/share/mautrix-imessage:/data

      # bbctl Beeper auth — kept in its own host directory (same path
      # bare-Linux uses), separate from bridge state. Lets you migrate
      # an existing bare-Linux ~/.config/bridge-manager/ into the
      # container with no copy, and lets bbctl auth survive any
      # rm-rf of the bridge state dir.
      - ~/.config/bridge-manager:/home/bridge/.config/bridge-manager

    environment:
      # Which homeserver are you connecting to?
      #   "true"  — Beeper
      #   "false" — self-hosted Synapse / Dendrite / Conduit
      BEEPER: "true"

    # UID:GID the container runs as. Default 1000:1000 (matches the
    # bundled bridge user in the image and the typical first Linux user).
    # Edit if your host bind-mount sources are owned by something else.
    #
    # Common alternatives:
    #   user: "99:100"     # UNRAID (nobody:users)
    #   user: "568:568"    # TrueNAS Scale (apps)
    #   user: "0:0"        # root (discouraged; only if you must)
    #
    # Whatever UID:GID you pick, imessage start will automatically verify
    # and correct bind-mount permissions to match. See docs/docker.md →
    # "Finding your UID and GID" for how to look up your host UID.
    user: "1000:1000"
