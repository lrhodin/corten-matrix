# Linux-only Docker Compose example for Rustpush-Matrix.
#
# Edit BEEPER and the two bind-mount sources for your host. The default
# paths match native Linux installs so you can switch between Docker and
# native without copying bridge state or bbctl auth.

services:
  Rustpush-Matrix:
    image: ghcr.io/lrhodin/imessage:latest
    container_name: Rustpush-Matrix
    restart: unless-stopped
    stdin_open: true
    tty: true

    environment:
      # "true" for Beeper, "false" for a self-hosted Matrix homeserver.
      BEEPER: "true"

    volumes:
      # Bridge state: config.yaml, database, session.json, trustedpeers.plist.
      - type: bind
        source: ${HOME}/.local/share/mautrix-imessage
        target: /data

      # bbctl Beeper auth. Keep this at the native Linux path so Docker and
      # native installs share the same login state.
      - type: bind
        source: ${HOME}/.config/bbctl
        target: /home/bridge/.config/bbctl

    # Must match ownership of the bind-mount sources. Set PUID/PGID in
    # your shell or .env file for your host, e.g. UNRAID nobody:users is
    # PUID=99 and PGID=100. Defaults match the typical first Linux user.
    user: "${PUID:-1000}:${PGID:-1000}"
